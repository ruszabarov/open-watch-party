services:
  open-watch-party-server:
    image: ghcr.io/ruszabarov/open-watch-party-server:latest
    restart: unless-stopped
    ports:
      - '8787:8787'
    environment:
      PORT: '8787'
      LOG_LEVEL: info
    labels:
      com.centurylinklabs.watchtower.enable: 'true'

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --label-enable
      - --interval
      - '300'
      - --cleanup
